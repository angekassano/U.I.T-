<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.I.T • Unité d'Instruction Tactique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        :root {
            --glass: rgba(15, 23, 42, 0.72);
            --glass-border: rgba(148, 163, 184, 0.35);
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: linear-gradient(135deg, #0a1421 0%, #1e2937 100%);
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px -12px rgba(0, 0, 0, 0.6),
                        inset 0 1px 0 0 rgba(255,255,255,0.08);
        }

        .glass-strong {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(40px) saturate(200%);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7),
                        inset 0 2px 0 0 rgba(255,255,255,0.1);
        }

        .military-bg {
            background: radial-gradient(circle at 50% 30%, rgba(34, 211, 238, 0.08), transparent 70%);
        }

        .scanline {
            position: relative;
            overflow: hidden;
        }
        
        .scanline::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 40%,
                rgba(103, 232, 249, 0.12) 50%,
                transparent 60%
            );
            animation: scan 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400%); }
        }

        .nav-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-item:hover {
            transform: translateX(8px);
            background: rgba(255,255,255,0.08) !important;
        }

        .modal {
            animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes modalPop {
            0% { transform: scale(0.75) translateY(40px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .status-valid {
            animation: glow-valid 2.5s ease-in-out infinite;
        }

        @keyframes glow-valid {
            0%, 100% { text-shadow: 0 0 20px rgb(16 185 129); }
            50% { text-shadow: 0 0 35px rgb(16 185 129); }
        }
    </style>
</head>
<body class="military-bg text-slate-200 min-h-screen overflow-hidden">
    <div class="flex h-screen">
        <!-- Sidebar améliorée -->
        <div class="w-72 glass-strong border-r border-slate-600/50 flex flex-col">
            <div class="p-6 border-b border-slate-600/50">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-3xl flex items-center justify-center text-black font-bold text-3xl shadow-inner">U</div>
                    <div>
                        <h1 class="title-font text-4xl font-bold tracking-[-2px]">U.I.T</h1>
                        <p class="text-[10px] text-cyan-300 tracking-[3px] mt-0.5">UNITE D'INSTRUCTION TACTIQUE</p>
                    </div>
                </div>
                <div class="mt-3 text-[10px] text-slate-500 font-mono">GLENDALE ONE • CONFIDENTIEL</div>
            </div>

            <div class="flex-1 p-4 space-y-1">
                <a onclick="navigateTo('dashboard')" class="nav-item active flex items-center gap-3 px-5 py-3.5 rounded-3xl text-slate-200">
                    <i class="fa-solid fa-gauge-high w-5"></i>
                    <span class="font-medium">Tableau de bord</span>
                </a>
                <a onclick="navigateTo('soldiers')" class="nav-item flex items-center gap-3 px-5 py-3.5 rounded-3xl hover:bg-white/10">
                    <i class="fa-solid fa-users w-5"></i>
                    <span class="font-medium">Effectifs</span>
                </a>
                <a onclick="navigateTo('formation')" class="nav-item flex items-center gap-3 px-5 py-3.5 rounded-3xl hover:bg-white/10">
                    <i class="fa-solid fa-graduation-cap w-5"></i>
                    <span class="font-medium">Validation Formation</span>
                </a>
                <a onclick="navigateTo('reports')" class="nav-item flex items-center gap-3 px-5 py-3.5 rounded-3xl hover:bg-white/10">
                    <i class="fa-solid fa-chart-column w-5"></i>
                    <span class="font-medium">Rapports</span>
                </a>
            </div>

            <div class="p-5 border-t border-slate-600/50">
                <div onclick="showAdminModal()" class="flex items-center gap-3 px-5 py-4 rounded-3xl hover:bg-amber-500/10 text-amber-400 cursor-pointer transition-all">
                    <i class="fa-solid fa-shield-halved text-lg"></i>
                    <span class="font-semibold">Accès Administratif</span>
                </div>
                <div class="text-center text-[10px] text-slate-500 mt-8">v27.4.2 • iOS Edition</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 glass-strong border-b border-slate-600/50 flex items-center px-8 justify-between">
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-2">
                        <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
                        <span class="text-emerald-400 font-medium text-sm">SYSTÈME OPÉRATIONNEL</span>
                    </div>
                </div>
                <div class="flex items-center gap-6 text-sm">
                    <div class="px-5 py-2 bg-slate-900/70 rounded-3xl flex items-center gap-2">
                        <i class="fa-solid fa-clock"></i>
                        <span id="current-time"></span>
                    </div>
                    <div onclick="logout()" class="flex items-center gap-2 text-red-400 hover:text-red-500 cursor-pointer">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                </div>
            </div>

            <!-- Pages (même structure que avant, avec design amélioré) -->
            <!-- ... (le reste du contenu reste identique pour ne pas alourdir, mais tout est plus beau grâce aux nouvelles classes glass) -->

            <!-- Dashboard (exemple amélioré) -->
            <div id="dashboard" class="flex-1 p-10 overflow-auto">
                <h2 class="title-font text-6xl font-bold tracking-tighter mb-10">Centre de Commandement</h2>
                
                <div class="grid grid-cols-12 gap-6">
                    <div class="col-span-12 lg:col-span-8 grid grid-cols-2 gap-6">
                        <div class="glass-strong rounded-3xl p-9 scanline">
                            <div class="flex justify-between">
                                <div>
                                    <div class="uppercase text-cyan-400 text-xs tracking-widest">Rang 0</div>
                                    <div id="rank0-count" class="text-7xl font-bold title-font mt-3">59</div>
                                </div>
                                <i class="fa-solid fa-user-shield text-7xl text-slate-700/70"></i>
                            </div>
                            <div class="text-emerald-400 mt-6 flex items-center gap-2 text-lg">
                                <span>FORMÉS CE MOIS</span>
                            </div>
                        </div>

                        <div class="glass-strong rounded-3xl p-9 scanline">
                            <div class="flex justify-between">
                                <div>
                                    <div class="uppercase text-violet-400 text-xs tracking-widest">Rang 1</div>
                                    <div id="rank1-count" class="text-7xl font-bold title-font mt-3">26</div>
                                </div>
                                <i class="fa-solid fa-user-ninja text-7xl text-slate-700/70"></i>
                            </div>
                            <div class="text-emerald-400 mt-6 flex items-center gap-2 text-lg">
                                <span>FORMÉS CE MOIS</span>
                            </div>
                        </div>
                    </div>
                    <!-- Autres cartes... -->
                </div>
            </div>

            <!-- Le reste des pages (soldiers, formation, reports) reste identique à la version précédente -->
            <!-- ... (copie-colle le contenu des divs #soldiers, #formation, #reports de la version précédente) -->
        </div>

</body>
